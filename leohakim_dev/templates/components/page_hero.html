<section class="surface-card px-7 py-9 sm:px-10">
  {% if back_link_href and back_link_label %}
    <a href="{{ back_link_href }}" class="accent-link">{{ back_link_label }}</a>
  {% endif %}
  {% if eyebrow %}
    <p class="{% if back_link_href and back_link_label %}mt-4 {% endif %}text-xs font-bold uppercase tracking-[0.16em] text-blue-700">
      {{ eyebrow }}
    </p>
  {% endif %}
  <h1 class="mt-3 text-3xl font-semibold leading-tight text-slate-950 sm:text-4xl">{{ title }}</h1>
  {% if lead %}<p class="mt-5 max-w-3xl text-base leading-relaxed text-slate-600">{{ lead }}</p>{% endif %}
  {% if supporting %}<p class="mt-4 max-w-3xl text-base leading-relaxed text-slate-600">{{ supporting }}</p>{% endif %}
</section>
